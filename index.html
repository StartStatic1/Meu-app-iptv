<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Mega - VOD & Séries</title>
    <style>
        :root { --primary: #E50914; --bg: #0A0A0A; --panel: #141414; --text: #FFFFFF; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navbar Superior */
        .navbar { background-color: var(--panel); padding: 15px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; border-bottom: 1px solid #333; z-index: 10; }
        .logo { font-size: 18px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-btn { background-color: transparent; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .nav-btn.active { background-color: var(--primary); color: #fff; border-color: var(--primary); }
        .search-box { flex: 1; min-width: 200px; display: flex; }
        .search-box input { width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background-color: #222; color: #fff; outline: none; }
        .search-box input:focus { border-color: var(--primary); }

        /* Player Fixo */
        .player-area { width: 100%; height: 30vh; background-color: #000; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid var(--primary); }
        video { max-width: 100%; max-height: 100%; width: 100%; }
        
        /* Layout Principal */
        .bottom-area { display: flex; flex: 1; overflow: hidden; }
        
        /* Barra Lateral */
        .sidebar { width: 35%; max-width: 180px; background-color: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .category-item { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 11px; font-weight: 600; color: #ccc; transition: 0.2s; }
        .category-item:hover, .category-item.active { background-color: #222; color: var(--primary); border-left: 3px solid var(--primary); }
        
        /* Grid de Conteúdo */
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: var(--bg); position: relative; }
        .top-bar { padding: 8px; background-color: #111; font-size: 11px; color: #888; text-align: center; border-bottom: 1px solid #222; }
        .grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; align-content: start; }
        
        /* Cartões */
        .card { background-color: #1a1a1a; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; height: 135px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); outline: 2px solid var(--primary); }
        .card-img { width: 100%; height: 100%; object-fit: cover; background-color: #222; }
        .card-title { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); font-size: 9px; font-weight: bold; padding: 20px 5px 5px 5px; text-align: center; box-sizing: border-box; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        /* Modal Customizado (Para Séries) */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--panel); padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #333; width: 100%; max-width: 300px; }
        .modal-content h3 { margin-top: 0; color: var(--primary); }
        .modal-btn { background: var(--primary); color: #fff; border: none; padding: 8px 20px; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">Cine Mega</div>
        <div class="nav-tabs">
            <button class="nav-btn active" id="btnFilmes" onclick="setModo('vod')">Filmes</button>
            <button class="nav-btn" id="btnSeries" onclick="setModo('series')">Séries</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Pesquisar título..." onkeyup="filtrarPesquisa()">
        </div>
    </div>

    <div class="player-area">
        <video id="videoPlayer" controls poster="https://via.placeholder.com/800x450/000000/E50914?text=CINE+MEGA+PLAYER"></video>
    </div>

    <div class="bottom-area">
        <div class="sidebar" id="categoryList">
            <div style="text-align:center; padding: 20px; font-size: 11px;">Carregando...</div>
        </div>

        <div class="main-content">
            <div class="top-bar" id="loading">Selecione uma categoria ao lado</div>
            <div class="grid" id="contentGrid"></div>
            
            <!-- Painel de Séries -->
            <div class="modal" id="seriesModal">
                <div class="modal-content">
                    <h3 id="modalTitle">Nome da Série</h3>
                    <p style="font-size: 12px; color: #aaa;">A listagem de temporadas e episódios será ativada na próxima versão do aplicativo nativo.</p>
                    <button class="modal-btn" onclick="fecharModal()">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let modoAtual = 'vod'; 
        let itensAtuais = []; // Guarda a lista atual para a pesquisa funcionar

        function setModo(modo) {
            modoAtual = modo;
            document.getElementById('btnFilmes').classList.toggle('active', modo === 'vod');
            document.getElementById('btnSeries').classList.toggle('active', modo === 'series');
            document.getElementById('contentGrid').innerHTML = "";
            document.getElementById('searchInput').value = ""; // Limpa pesquisa
            document.getElementById('loading').innerText = "Carregando categorias...";
            carregarCategorias();
        }

        async function carregarCategorias() {
            const list = document.getElementById('categoryList');
            list.innerHTML = "<div style='padding:10px; text-align:center;'>Aguarde...</div>";
            const action = modoAtual === 'vod' ? 'get_vod_categories' : 'get_series_categories';

            try {
                const response = await fetch(`/api/iptv?action=${action}`);
                const categorias = await response.json();
                list.innerHTML = ""; 
                
                categorias.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'category-item';
                    div.innerText = cat.category_name;
                    div.onclick = (e) => {
                        // Marca a categoria clicada
                        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                        e.target.classList.add('active');
                        carregarConteudo(cat.category_id, cat.category_name);
                    };
                    list.appendChild(div);
                });
            } catch (error) {
                list.innerHTML = "<div style='color:red; padding:10px;'>Erro de servidor</div>";
            }
        }

        async function carregarConteudo(id, nomeCategoria) {
            const loading = document.getElementById('loading');
            document.getElementById('contentGrid').innerHTML = "";
            document.getElementById('searchInput').value = "";
            loading.innerText = `Buscando: ${nomeCategoria}...`;

            const action = modoAtual === 'vod' ? 'get_vod_streams' : 'get_series';

            try {
                const response = await fetch(`/api/iptv?action=${action}&category_id=${id}`);
                itensAtuais = await response.json(); // Salva na memória
                
                loading.innerText = `${itensAtuais.length} títulos em: ${nomeCategoria}`;
                renderizarGrid(itensAtuais);
            } catch (error) {
                loading.innerText = "Falha ao carregar títulos.";
                itensAtuais = [];
            }
        }

        function renderizarGrid(itens) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = "";

            if(itens.length === 0) {
                grid.innerHTML = "<div style='color:#666; font-size:12px;'>Nenhum título encontrado.</div>";
                return;
            }

            itens.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let urlCapa = item.stream_icon || item.cover || "";
                if (urlCapa.trim() === "") urlCapa = 'https://via.placeholder.com/150x225/222222/E50914?text=CINE+MEGA';

                const titulo = item.name || "Sem Título";
                const itemId = item.stream_id || item.series_id;
                const ext = item.container_extension || 'mp4';
                
                card.innerHTML = `
                    <img class="card-img" src="${urlCapa}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x225/222222/E50914?text=CINE+MEGA'">
                    <div class="card-title">${titulo}</div>
                `;
                
                card.onclick = () => {
                    if (modoAtual === 'vod') {
                        tocarFilme(itemId, titulo, ext);
                    } else {
                        abrirModalSerie(titulo);
                    }
                };
                grid.appendChild(card);
            });
        }

        // Função de Pesquisa
        function filtrarPesquisa() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const itensFiltrados = itensAtuais.filter(item => {
                const titulo = (item.name || "").toLowerCase();
                return titulo.includes(termo);
            });
            renderizarGrid(itensFiltrados);
        }

                async function tocarFilme(streamId, titulo, ext) {
            const loading = document.getElementById('loading');
            loading.innerText = `Preparando: ${titulo}...`;

            try {
                const response = await fetch(`/api/iptv?action=get_movie_url&stream_id=${streamId}&extension=${ext}`);
                const data = await response.json();
                
                // VERIFICA SE ESTÁ DENTRO DO SEU APLICATIVO APK
                if (window.AndroidApp) {
                    loading.innerText = `Abrindo no player nativo...`;
                    window.AndroidApp.abrirVideoNativo(data.url); // Chama o Java!
                } else {
                    // Se o usuário tentar assistir pelo Chrome normal (Fallback)
                    const video = document.getElementById('videoPlayer');
                    video.src = data.url;
                    video.play().catch(() => console.log("Aguardando play manual"));
                    loading.innerText = `Assistindo no navegador: ${titulo}`;
                }
                
            } catch (error) {
                loading.innerText = "Erro ao buscar vídeo.";
            }
        }

        function abrirModalSerie(titulo) {
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('seriesModal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('seriesModal').style.display = 'none';
        }

        window.onload = () => setModo('vod');
    </script>
</body>
</html>
