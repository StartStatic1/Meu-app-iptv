<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamFlix</title>
    <!-- Ícones minimalistas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Variáveis de Cor - Foco no Preto Absoluto e Violeta Neon */
        :root { 
            --bg: #000000; 
            --accent: #8A2BE2; /* Violeta Neon */
            --glass: rgba(20, 20, 20, 0.7);
            --text: #FFFFFF; 
            --text-muted: #888888;
        }

        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; padding-bottom: 80px; }
        
        /* Destaque Principal (Hero) */
        .hero { position: relative; width: 100%; height: 55vh; background: url('https://image.tmdb.org/t/p/original/8rpDcsfLJypbO6vtecsmREy9O8C.jpg') center/cover; }
        .hero-gradient { position: absolute; bottom: 0; width: 100%; height: 60%; background: linear-gradient(to top, var(--bg) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; box-sizing: border-box; }
        .hero-title { font-size: 28px; font-weight: 900; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-tags { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        
        /* Botão de Play Imersivo */
        .play-btn { background: var(--accent); color: #fff; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; width: max-content; box-shadow: 0 0 15px rgba(138, 43, 226, 0.5); cursor: pointer; }

        /* Fileiras de Filmes (Carrossel Horizontal) */
        .section-title { font-size: 14px; font-weight: 700; margin: 20px 0 10px 15px; color: #ddd; }
        .carousel { display: flex; gap: 12px; padding: 0 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; } /* Esconde barra de rolagem */
        
        .card { flex: 0 0 110px; height: 160px; border-radius: 10px; background-color: #111; scroll-snap-align: start; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Barra de Navegação Inferior (Glassmorphism) */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-muted); font-size: 18px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .nav-item span { font-size: 9px; font-weight: 600; }
    </style>
</head>
<body>

    <!-- Destaque Principal -->
    <div class="hero">
        <div class="hero-gradient">
            <div class="hero-tags">Ação • Lançamento</div>
            <h1 class="hero-title">O Resgate</h1>
            <br>
            <button class="play-btn"><i class="fas fa-play"></i> Assistir Agora</button>
        </div>
    </div>

    <!-- Carrossel 1 -->
    <div class="section-title">Recomendados para Você</div>
    <div class="carousel">
        <div class="card"><img src="https://via.placeholder.com/220x330/111/fff?text=Filme+1" alt=""></div>
        <div class="card"><img src="https://via.placeholder.com/220x330/111/fff?text=Filme+2" alt=""></div>
        <div class="card"><img src="https://via.placeholder.com/220x330/111/fff?text=Filme+3" alt=""></div>
        <div class="card"><img src="https://via.placeholder.com/220x330/111/fff?text=Filme+4" alt=""></div>
        <div class="card"><img src="https://via.placeholder.com/220x330/111/fff?text=Filme+5" alt=""></div>
    </div>

    <!-- Carrossel 2 -->
    <div class="section-title">Séries em Alta</div>
    <div class="carousel">
        <div class="card" style="flex: 0 0 180px; height: 100px;"><img src="https://via.placeholder.com/360x200/111/fff?text=Serie+1" alt=""></div>
        <div class="card" style="flex: 0 0 180px; height: 100px;"><img src="https://via.placeholder.com/360x200/111/fff?text=Serie+2" alt=""></div>
        <div class="card" style="flex: 0 0 180px; height: 100px;"><img src="https://via.placeholder.com/360x200/111/fff?text=Serie+3" alt=""></div>
    </div>

    <!-- Barra de Navegação Inferior -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Início</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-search"></i>
            <span>Buscar</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-tv"></i>
            <span>Séries</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-bookmark"></i>
            <span>Minha Lista</span>
        </div>
    </div>

</body>
</html>
