<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamFlix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Paleta Disney+ */
        :root { 
            --bg-top: #1a1d29; --bg-bottom: #040714; --accent: #00e5ff; 
            --glass: rgba(26, 29, 41, 0.85); --text: #f9f9f9; --text-muted: #8f98b0;
        }

        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed; color: var(--text); font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; padding-bottom: 90px; 
        }
        
        /* Topo e Hero */
        .header { position: absolute; top: 0; width: 100%; padding: 15px; z-index: 10; text-align: center; background: linear-gradient(to bottom, rgba(4,7,20,0.8), transparent); }
        .header-logo { font-size: 22px; font-weight: 900; color: #fff; margin: 0; }
        .header-logo span { color: var(--accent); text-shadow: 0 0 12px rgba(0, 229, 255, 0.6); }

        .hero { position: relative; width: 100%; height: 55vh; background-position: center; background-size: cover; border-radius: 0 0 20px 20px; transition: background-image 0.5s ease; background-color: #111; }
        .hero-gradient { position: absolute; bottom: 0; width: 100%; height: 80%; background: linear-gradient(to top, var(--bg-top) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border-radius: 0 0 20px 20px;}
        .hero-title { font-size: 28px; font-weight: 900; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); }
        .hero-tags { font-size: 12px; color: #ccc; font-weight: 600; margin-bottom: 15px; text-transform: uppercase;}
        
        .play-btn { background: var(--accent); color: #000; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 800; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4); cursor: pointer; text-transform: uppercase; }

        /* Vistas (Telas) */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Carrosséis */
        .section-title { font-size: 15px; font-weight: 700; margin: 25px 0 12px 15px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--accent); }
        .carousel { display: flex; gap: 12px; padding: 0 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; min-height: 165px; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .card-movie { flex: 0 0 110px; height: 165px; border-radius: 8px; background-color: #2a2d3e; scroll-snap-align: start; overflow: hidden; cursor: pointer; position: relative; }
        .card-movie img { width: 100%; height: 100%; object-fit: cover; }
        .card-movie .titulo-fallback { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: white; font-size: 9px; padding: 5px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .card-tv { flex: 0 0 140px; height: 80px; border-radius: 8px; background-color: rgba(255,255,255,0.05); scroll-snap-align: start; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .card-tv img { width: 50%; object-fit: contain; }
        .live-badge { position: absolute; top: 5px; right: 5px; background: red; color: white; font-size: 8px; font-weight: bold; padding: 2px 5px; border-radius: 4px; }

        /* Barra Inferior */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 18px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 20%; transition: 0.2s; }
        .nav-item.active { color: var(--text); }
        .nav-item.active i { color: var(--accent); text-shadow: 0 0 12px rgba(0, 229, 255, 0.8); transform: scale(1.1); }
        .nav-item span { font-size: 10px; font-weight: 600; }

        /* =========================================
           COMPONENTES OCULTOS (SPA)
           ========================================= */
        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .bottom-sheet-overlay.active { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--bg-top); border-radius: 24px 24px 0 0; z-index: 2000; padding: 20px; transition: bottom 0.4s ease; border-top: 1px solid rgba(255,255,255,0.05); }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px; }
        .sheet-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; text-transform: uppercase; cursor: pointer; }

        .details-page { position: fixed; top: 0; left: 100%; width: 100%; height: 100vh; background: var(--bg-bottom); z-index: 3000; transition: left 0.3s ease-out; overflow-y: auto; padding-bottom: 30px; }
        .details-page.active { left: 0; }
        .dp-back-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; z-index: 3010; backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .dp-poster { width: 100%; height: 60vh; background-position: top center; background-size: cover; position: relative; background-color: #111; }
        .dp-gradient { position: absolute; bottom: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg-bottom) 0%, rgba(4,7,20,0.5) 50%, transparent 100%); }
        .dp-content { padding: 0 20px; margin-top: -60px; position: relative; z-index: 2; }
        .dp-title { font-size: 32px; font-weight: 900; margin: 0 0 10px 0; line-height: 1.1; }
        .dp-meta { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 20px; display: flex; gap: 15px; }
        .dp-meta span { color: var(--text-muted); font-weight: normal; }
        .dp-play-btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 800; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .dp-synopsis { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 25px; }
        
        /* Centralizador de Loading */
        .loading-text { text-align: center; color: var(--text-muted); font-size: 12px; width: 100%; padding: 20px; }
    </style>
</head>
<body>

    <div class="header"><h1 class="header-logo">Stream<span>Flix</span></h1></div>

    <div id="view-home" class="view active">
        <div class="hero" id="heroBanner" style="background-image: url('');" onclick="">
            <div class="hero-gradient">
                <div class="hero-tags" id="heroTags">Carregando...</div>
                <h1 class="hero-title" id="heroTitle">Aguarde</h1><br>
                <button class="play-btn"><i class="fas fa-info-circle"></i> Detalhes</button>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-film"></i> Lançamentos VIP</div>
        <div class="carousel" id="carrossel-filmes">
            <div class="loading-text">Buscando no servidor...</div>
        </div>

        <div class="section-title"><i class="fas fa-tv"></i> Séries em Alta</div>
        <div class="carousel" id="carrossel-series">
            <div class="loading-text">Buscando no servidor...</div>
        </div>
    </div>

    <div id="view-filmes" class="view" style="padding-top: 80px; text-align: center;">
        <h2 style="color: var(--accent);">Todos os Filmes</h2>
        <p style="color: var(--text-muted); font-size: 12px;">Esta grade será construída no próximo passo!</p>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="mudarAba('view-home', this)"><i class="fas fa-home"></i><span>Início</span></div>
        <div class="nav-item" onclick="mudarAba('view-filmes', this)"><i class="fas fa-film"></i><span>Filmes</span></div>
        <div class="nav-item" onclick="mudarAba('view-series', this)"><i class="fas fa-tv"></i><span>Séries</span></div>
        <div class="nav-item" onclick="mudarAba('view-buscar', this)"><i class="fas fa-search"></i><span>Buscar</span></div>
    </div>

    <div class="bottom-sheet-overlay" id="sheetOverlay" onclick="fecharSheetTV()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>
        <h2 style="margin:0 0 5px; color:#fff;" id="tvTitle">Canal</h2>
        <p style="margin:0 0 10px; font-size:12px; color:#888;" id="tvDesc">Descrição...</p>
        <button class="sheet-btn" onclick="chamarPlayerNativo()"><i class="fas fa-play"></i> Assistir Agora</button>
    </div>

    <div class="details-page" id="detailsPage">
        <button class="dp-back-btn" onclick="fecharDetalhes()"><i class="fas fa-arrow-left"></i></button>
        <div class="dp-poster" id="dpPoster" style="background-image: url('');">
            <div class="dp-gradient"></div>
        </div>
        <div class="dp-content">
            <h1 class="dp-title" id="dpTitle">Título</h1>
            <div class="dp-meta" id="dpMeta"><span>Ano | Gênero | Duração</span></div>
            <button class="dp-play-btn" onclick="chamarPlayerNativo()"><i class="fas fa-play"></i> Assistir</button>
            <p class="dp-synopsis" id="dpSynopsis">Sinopse...</p>
        </div>
    </div>

    <script>
        // --- 1. MOTOR DE NAVEGAÇÃO (BOTÕES INFERIORES) ---
        function mudarAba(idView, elementoClicado) {
            // Tira a cor "ativa" de todos os botões
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            // Coloca a cor "ativa" no botão clicado
            elementoClicado.classList.add('active');

            // Esconde todas as telas
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            // Mostra apenas a tela que foi chamada (se ela existir)
            const telaAlvo = document.getElementById(idView);
            if(telaAlvo) telaAlvo.classList.add('active');
        }

        // --- 2. MOTOR DE DADOS (CONEXÃO COM A API IPTV) ---
        async function carregarHome() {
            try {
                // Puxa as categorias de Filmes primeiro
                const resCats = await fetch('/api/iptv?action=get_vod_categories');
                const categorias = await resCats.json();
                
                // Pega o ID da primeira categoria da sua lista (ex: Lançamentos)
                if(categorias && categorias.length > 0) {
                    const idPrimeiraCat = categorias[0].category_id;
                    const nomeCat = categorias[0].category_name;
                    
                    // Puxa os filmes dessa categoria
                    const resFilmes = await fetch(`/api/iptv?action=get_vod_streams&category_id=${idPrimeiraCat}`);
                    const filmes = await resFilmes.json();
                    
                    // Preenche a tela!
                    if(filmes && filmes.length > 0) {
                        preencherHeroBanner(filmes[0], nomeCat);
                        preencherCarrossel('carrossel-filmes', filmes.slice(1, 15), nomeCat); // Pega 15 filmes
                    }
                }
            } catch (error) {
                console.log("Erro ao carregar os dados:", error);
                document.getElementById('carrossel-filmes').innerHTML = "<div class='loading-text'>Erro ao conectar com o servidor.</div>";
            }
        }

        // Função para montar o Destaque Gigante (Hero)
        function preencherHeroBanner(filme, nomeCategoria) {
            const banner = document.getElementById('heroBanner');
            const titulo = document.getElementById('heroTitle');
            const tags = document.getElementById('heroTags');
            
            let capa = filme.stream_icon || 'https://via.placeholder.com/800x600/111/fff?text=StreamFlix';
            
            banner.style.backgroundImage = `url('${capa}')`;
            titulo.innerText = filme.name || "Sem Título";
            tags.innerText = `${nomeCategoria} • Adicionado Recente`;
            
            // Quando clicar no banner, abre a tela de detalhes imersiva
            banner.onclick = () => abrirDetalhes(
                filme.name, 
                nomeCategoria, 
                "Duração Indisponível", 
                "Ano Indisponível", 
                "Sinopse completa será carregada na próxima fase.", 
                capa,
                filme.stream_id // ID para o Play nativo no futuro
            );
        }

        // Função para montar as capinhas nos Carrosséis
        function preencherCarrossel(idContainer, listaFilmes, nomeCategoria) {
            const container = document.getElementById(idContainer);
            container.innerHTML = ""; // Limpa o "Carregando..."

            listaFilmes.forEach(filme => {
                const card = document.createElement('div');
                card.className = 'card-movie';
                
                let capa = filme.stream_icon || '';
                // Se a capa vier vazia, coloca o nome do filme no fundo
                let imagemHtml = capa 
                    ? `<img src="${capa}" loading="lazy" onerror="this.src='https://via.placeholder.com/220x330/111/fff?text=Sem+Imagem'">`
                    : `<img src="https://via.placeholder.com/220x330/111/fff?text=Cine"><div class="titulo-fallback">${filme.name}</div>`;

                card.innerHTML = imagemHtml;
                
                // O clique no cartaz abre os Detalhes
                card.onclick = () => abrirDetalhes(
                    filme.name, nomeCategoria, "-", "-", "Detalhes na próxima fase.", capa, filme.stream_id
                );
                
                container.appendChild(card);
            });
        }

        // --- FUNÇÕES DA TELA DE DETALHES ---
        function abrirDetalhes(titulo, genero, duracao, ano, sinopse, urlCapa, streamId) {
            document.getElementById('dpTitle').innerText = titulo;
            document.getElementById('dpMeta').innerHTML = `${ano} <span>|</span> ${genero} <span>|</span> ${duracao}`;
            document.getElementById('dpSynopsis').innerText = sinopse;
            
            let capaCerta = urlCapa || 'https://via.placeholder.com/800x600/111/fff?text=StreamFlix';
            document.getElementById('dpPoster').style.backgroundImage = `url('${capaCerta}')`;
            
            document.getElementById('detailsPage').classList.add('active');
            history.pushState({ modalOpen: true, type: 'details' }, null, "");
        }

        function fecharDetalhes() { document.getElementById('detailsPage').classList.remove('active'); }
        function chamarPlayerNativo() { alert("Botão acionado! Preparado para chamar o player do Poco M6."); }

        window.addEventListener('popstate', function(event) {
            if (document.getElementById('detailsPage').classList.contains('active')) fecharDetalhes();
        });

        // Inicia o motor assim que a tela abre!
        window.onload = () => {
            carregarHome();
        };
    </script>
</body>
</html>
