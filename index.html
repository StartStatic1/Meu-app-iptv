<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamFlix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-top: #1a1d29; --bg-bottom: #040714; --accent: #00e5ff; 
            --glass: rgba(26, 29, 41, 0.85); --text: #f9f9f9; --text-muted: #8f98b0;
        }

        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed; color: var(--text); font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; padding-bottom: 90px; 
        }
        
        .header { position: absolute; top: 0; width: 100%; padding: 15px; z-index: 10; text-align: center; background: linear-gradient(to bottom, rgba(4,7,20,0.8), transparent); }
        .header-logo { font-size: 22px; font-weight: 900; color: #fff; margin: 0; }
        .header-logo span { color: var(--accent); text-shadow: 0 0 12px rgba(0, 229, 255, 0.6); }

        .hero { position: relative; width: 100%; height: 55vh; background-position: top center; background-size: cover; border-radius: 0 0 20px 20px; transition: background-image 0.8s ease; background-color: #111; cursor: pointer; }
        .hero-gradient { position: absolute; bottom: 0; width: 100%; height: 80%; background: linear-gradient(to top, var(--bg-top) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border-radius: 0 0 20px 20px;}
        .hero-title { font-size: 26px; font-weight: 900; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); }
        .hero-tags { font-size: 11px; color: #ccc; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; display: flex; gap: 5px; align-items: center; flex-wrap: wrap;}
        
        .play-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4); cursor: pointer; text-transform: uppercase; width: max-content; }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Skeleton Loader Otimizado */
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton { background: #2a2d3e; background-image: linear-gradient(90deg, #2a2d3e 0px, #3a3e52 40px, #2a2d3e 80px); background-size: 1000px 100%; animation: shimmer 2.5s infinite linear; }
        .skel-hero { width: 100%; height: 55vh; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        .skel-title { width: 40%; height: 18px; margin: 25px 0 15px 15px; border-radius: 4px; }
        .skel-carousel { display: flex; gap: 12px; padding: 0 15px; overflow: hidden; margin-bottom: 20px; }
        .skel-card { flex: 0 0 110px; height: 165px; border-radius: 8px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 15px 10px 15px; }
        .section-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #fff; }
        .section-title i { color: var(--accent); }
        .ver-todos { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 5px 10px; background: rgba(0,229,255,0.1); border-radius: 15px;}
        
        .carousel { display: flex; gap: 12px; padding: 0 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; min-height: 165px; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .card-movie { flex: 0 0 110px; height: 165px; border-radius: 8px; background-color: #2a2d3e; scroll-snap-align: start; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .card-movie img { width: 100%; height: 100%; object-fit: cover; }
        .card-movie .titulo-fallback { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); color: white; font-size: 9px; padding: 8px 4px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .card-badges { position: absolute; top: 5px; left: 5px; display: flex; flex-direction: column; gap: 4px; z-index: 2; pointer-events: none; }
        
        /* Otimização dos Cards de TV para a nova Aba */
        .card-tv { flex: 0 0 140px; height: 90px; border-radius: 8px; background-color: rgba(255,255,255,0.05); scroll-snap-align: start; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; flex-direction: column; padding: 5px;}
        .card-tv img { width: 50%; height: 60%; object-fit: contain; }
        .card-tv .titulo-tv { font-size: 10px; font-weight: bold; padding-top: 5px; text-align: center; color: #ccc; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live-badge { position: absolute; top: 5px; right: 5px; background: #e50914; color: white; font-size: 7px; font-weight: bold; padding: 2px 4px; border-radius: 3px; }

        .page-header { padding: 40px 15px 15px 15px; display: flex; align-items: center; gap: 15px; background: linear-gradient(to bottom, var(--bg-top), transparent); }
        .page-header i { font-size: 20px; color: var(--accent); cursor: pointer; padding: 10px;}
        .page-title { font-size: 22px; font-weight: 800; margin: 0; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px 20px 15px; }
        .grid-container .card-movie { flex: unset; width: 100%; height: 160px; }

        .search-bar { width: calc(100% - 30px); margin: 60px auto 20px auto; padding: 15px 20px; border-radius: 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none; display: block; box-sizing: border-box; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 18px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 20%; transition: 0.2s; }
        .nav-item.active { color: var(--text); }
        .nav-item.active i { color: var(--accent); text-shadow: 0 0 12px rgba(0, 229, 255, 0.8); transform: scale(1.1); }
        .nav-item span { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .bottom-sheet-overlay.active { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--bg-top); border-radius: 24px 24px 0 0; z-index: 2000; padding: 20px; transition: bottom 0.4s ease; border-top: 1px solid rgba(255,255,255,0.05); }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px; }
        .sheet-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; text-transform: uppercase; cursor: pointer; }

        .details-page { position: fixed; top: 0; left: 100%; width: 100%; height: 100vh; background: var(--bg-bottom); z-index: 3000; transition: left 0.3s ease-out; overflow-y: auto; padding-bottom: 30px; }
        .details-page.active { left: 0; }
        .dp-back-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; z-index: 3010; backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .dp-poster { width: 100%; height: 60vh; background-position: top center; background-size: cover; position: relative; background-color: #111; }
        .dp-gradient { position: absolute; bottom: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg-bottom) 0%, rgba(4,7,20,0.5) 50%, transparent 100%); }
        .dp-content { padding: 0 20px; margin-top: -60px; position: relative; z-index: 2; }
        .dp-title { font-size: 30px; font-weight: 900; margin: 0 0 10px 0; line-height: 1.1; }
        .dp-meta { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 20px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;}
        .dp-play-btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 800; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .dp-synopsis { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="header"><h1 class="header-logo">Stream<span>Flix</span></h1></div>

    <div id="view-home" class="view active">
        <div id="loading-state">
            <div class="skeleton skel-hero"></div>
            <div class="skeleton skel-title"></div>
            <div class="skel-carousel"><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div></div>
        </div>

        <div id="conteudo-real" style="display: none;">
            <div class="hero" id="heroBanner" style="background-image: url('');" onclick="abrirHeroDetalhes()">
                <div class="hero-gradient">
                    <div class="hero-tags" id="heroTags">Aguarde...</div>
                    <h1 class="hero-title" id="heroTitle">Carregando...</h1><br>
                    <button class="play-btn"><i class="fas fa-play"></i> Assistir</button>
                </div>
            </div>
            <div id="conteudo-dinamico"></div>
        </div>
    </div>

    <div id="view-grade" class="view">
        <div class="page-header">
            <i class="fas fa-arrow-left" onclick="mudarAba('view-home', document.getElementById('nav-home'))"></i>
            <h2 class="page-title" id="titulo-grade">Carregando...</h2>
        </div>
        <div class="grid-container" id="conteudo-grade"></div>
    </div>

    <div id="view-tv" class="view" style="padding-top: 60px;">
        <div class="page-header" style="padding-top: 20px;">
            <h2 class="page-title" style="color: var(--accent);"><i class="fas fa-broadcast-tower"></i> Canais de TV</h2>
        </div>
        <div id="conteudo-tv">
            <p class="loading-text">Conectando aos canais ao vivo...</p>
        </div>
    </div>

    <div id="view-buscar" class="view">
        <input type="text" class="search-bar" id="inputBusca" placeholder="Buscar filmes, séries..." disabled>
        <div class="section-title" style="margin-left: 15px;"><i class="fas fa-search"></i> Resultados</div>
        <div class="grid-container" id="resultados-busca">
            <p class="loading-text" style="grid-column: span 3;">Motor de busca na próxima fase.</p>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" id="nav-home" onclick="mudarAba('view-home', this)"><i class="fas fa-home"></i><span>Início</span></div>
        <div class="nav-item" onclick="alert('Na próxima fase!')"><i class="fas fa-film"></i><span>Filmes</span></div>
        <div class="nav-item" onclick="alert('Na próxima fase!')"><i class="fas fa-tv"></i><span>Séries</span></div>
        <div class="nav-item" id="nav-tv" onclick="mudarAba('view-tv', this)"><i class="fas fa-broadcast-tower"></i><span>TV</span></div>
        <div class="nav-item" id="nav-buscar" onclick="mudarAba('view-buscar', this)"><i class="fas fa-search"></i><span>Buscar</span></div>
    </div>

    <div class="bottom-sheet-overlay" id="sheetOverlay" onclick="fecharSheetTV()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>
        <div class="card-badges" id="tvBadges" style="position: relative; left:0; top:0; flex-direction: row; margin-bottom:10px;"></div>
        <h2 style="margin:0 0 5px; color:#fff;" id="tvTitle">Canal</h2>
        <button class="sheet-btn" id="btnPlayTV"><i class="fas fa-play"></i> Assistir Agora</button>
    </div>

    <div class="details-page" id="detailsPage">
        <button class="dp-back-btn" onclick="fecharDetalhes()"><i class="fas fa-arrow-left"></i></button>
        <div class="dp-poster" id="dpPoster" style="background-image: url('');">
            <div class="dp-gradient"></div>
        </div>
        <div class="dp-content">
            <h1 class="dp-title" id="dpTitle">Título</h1>
            <div class="dp-meta" id="dpMeta">Categoria</div>
            <button class="dp-play-btn" id="btnPlayFilme"><i class="fas fa-play"></i> Assistir</button>
            <p class="dp-synopsis" id="dpSynopsis">Aguardando TMDB (Próxima Fase)...</p>
        </div>
    </div>

    <script>
        let heroFilmes = [];
        let heroIndex = 0;
        let heroInterval = null;
        let tvFoiCarregada = false; // Memória para não carregar a TV duas vezes

        function esc(str) { return (str || '').toString().replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        // LIMPEZA DE PASTAS (Remove a palavra "Filmes | " para ficar mais bonito)
        function limparNomePasta(nome) {
            return nome.replace(/Filmes\s*\|\s*/i, '').replace(/Séries\s*\|\s*/i, '').trim();
        }

        function pastaValida(nome) {
            if (!nome) return false;
            const proibidos = ['JOGOS', 'REALITY', 'XXX', 'RELIGIOSO', 'ADULTO', '+18', '24H', 'CÂMERA', 'RADIO', 'OSCAR', 'TESTE'];
            return !proibidos.some(p => nome.toUpperCase().includes(p));
        }

        function pastaTVValida(nome) {
            if (!nome) return false;
            const proibidos = ['JOGOS', 'REALITY', 'XXX', 'RELIGIOSO', 'ADULTO', '+18', '24H', 'RADIO'];
            return !proibidos.some(p => nome.toUpperCase().includes(p));
        }

        function processarTitulo(nomeBruto, nomePasta) {
            let nomeLimpo = nomeBruto || "Sem Título";
            const tags = [];
            const pU = nomePasta ? nomePasta.toUpperCase() : '';

            if(pU.includes('4K') || /4K|UHD|2160p/i.test(nomeLimpo)) tags.push('4K');
            if(/FHD|1080p/i.test(nomeLimpo)) tags.push('FHD');
            if(/HD|720p/i.test(nomeLimpo)) tags.push('HD');
            if(pU.includes('LEGENDADO') || /\[LEG\]|\(LEG\)/i.test(nomeLimpo)) tags.push('LEG');
            else if(pU.includes('DUBLADO') || /\[DUB\]|\(DUB\)/i.test(nomeLimpo)) tags.push('DUB');

            nomeLimpo = nomeLimpo.replace(/(4K|UHD|2160p|FHD|1080p|HD|720p)/ig, '').replace(/\[(DUB|LEG|VOD).*?\]/ig, '').replace(/\((DUB|LEG).*?\)/ig, '').replace(/\|.*?\|/g, '').replace(/-\s*$/, '').replace(/\s+/g, ' ').trim(); 
            if(nomeLimpo.length < 2) nomeLimpo = nomeBruto.substring(0, 20);
            return { limpo: nomeLimpo, tagsStr: tags.join(',') };
        }

        // LIMPADOR DE CANAIS DE TV MÁXIMO
        function processarTV(nomeBruto) {
            let nomeLimpo = nomeBruto || "Canal";
            const tags = [];
            const estado = nomeLimpo.match(/\b(SP|RJ|MG|RS|PR|SC|BA|PE|CE|DF|GO|MT|MS|AM|AC|PA|RR|RO|AP|TO|PI|MA|PB|AL|SE|RN)\b/i);
            if(estado) tags.push(estado[0].toUpperCase());
            
            if(/FHDR/i.test(nomeLimpo)) tags.push('FHDR');
            else if(/FHD/i.test(nomeLimpo)) tags.push('FHD');
            else if(/HD/i.test(nomeLimpo)) tags.push('HD');
            else if(/4K/i.test(nomeLimpo)) tags.push('4K');
            else if(/SD/i.test(nomeLimpo)) tags.push('SD');

            nomeLimpo = nomeLimpo.replace(/(FHDR|FHD|HD|4K|SD)/ig, '').replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/[>\-|*]/g, '').replace(/\b(SP|RJ|MG|RS|PR|SC|BA|PE|CE|DF|GO|MT|MS|AM|AC|PA|RR|RO|AP|TO|PI|MA|PB|AL|SE|RN)\b/ig, '').replace(/\s+/g, ' ').trim();
            return { limpo: nomeLimpo, tagsStr: tags.join(',') };
        }

        function gerarHTMLBadges(tagsStr) {
            if(!tagsStr) return '';
            let html = '';
            tagsStr.split(',').forEach(t => {
                let cor = '#000', bg = '#fff';
                if(t==='4K') { cor='#fff'; bg='#ff1744'; }
                if(t==='FHDR') { cor='#fff'; bg='#d50000'; }
                if(t==='FHD') { cor='#000'; bg='#00e5ff'; }
                if(t==='HD') { cor='#000'; bg='#76ff03'; }
                if(t==='DUB') { cor='#000'; bg='#00e676'; }
                if(t==='LEG') { cor='#fff'; bg='#b388ff'; }
                if(t.length === 2) { cor='#fff'; bg='#ff9100'; } 
                html += `<span style="background:${bg}; color:${cor}; font-size:8px; font-weight:900; padding:3px 5px; border-radius:4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">${t}</span>`;
            });
            return html;
        }

        // INTELIGÊNCIA DO BOTÃO VOLTAR E NAVEGAÇÃO
        function mudarAba(idView, btn) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(idView).classList.add('active');

            // Histórico para o botão voltar funcionar perfeito
            if(idView !== 'view-home') history.pushState({ aba: idView }, null, "");

            // Carrega a TV apenas se o utilizador clicar na aba TV
            if(idView === 'view-tv' && !tvFoiCarregada) {
                carregarTV();
            }
        }

        // CARREGAMENTO TURBO DA HOME (Apenas Filmes e Séries)
        async function initApp() {
            try {
                let htmlConstruido = "";
                
                // Puxa a primeira pasta de filmes para libertar o ecrã RÁPIDO
                const resVodCats = await fetch('/api/iptv?action=get_vod_categories');
                const vodCats = await resVodCats.json();
                const pastasFilmes = vodCats.filter(c => pastaValida(c.category_name)).sort((a,b) => {
                    const pri = /LANÇA|AÇÃO|COMÉDIA|TERROR/i;
                    return pri.test(b.category_name) - pri.test(a.category_name);
                }).slice(0, 5); 

                if(pastasFilmes.length > 0) {
                    const res1 = await fetch(`/api/iptv?action=get_vod_streams&category_id=${pastasFilmes[0].category_id}`);
                    const filmes1 = await res1.json();
                    if(filmes1 && filmes1.length > 0) {
                        heroFilmes = filmes1.slice(0, 5);
                        iniciarHeroSlider(limparNomePasta(pastasFilmes[0].category_name));
                        htmlConstruido += gerarCarrosselHTML(limparNomePasta(pastasFilmes[0].category_name), pastasFilmes[0].category_id, 'vod', 'film', filmes1.slice(5, 20));
                    }
                }

                // LIBERTA O ECRÃ EM 1 SEGUNDO!
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('conteudo-real').style.display = 'block';
                document.getElementById('conteudo-dinamico').innerHTML = htmlConstruido;

                // Carrega o resto silenciosamente no fundo
                setTimeout(async () => {
                    let htmlExtra = "";
                    for(let i = 1; i < pastasFilmes.length; i++) {
                        const res = await fetch(`/api/iptv?action=get_vod_streams&category_id=${pastasFilmes[i].category_id}`);
                        const filmes = await res.json();
                        if(filmes && filmes.length > 0) htmlExtra += gerarCarrosselHTML(limparNomePasta(pastasFilmes[i].category_name), pastasFilmes[i].category_id, 'vod', 'film', filmes.slice(0, 15));
                    }

                    const resSerieCats = await fetch('/api/iptv?action=get_series_categories');
                    const serieCats = await resSerieCats.json();
                    const pastasSeries = serieCats.filter(c => pastaValida(c.category_name)).slice(0, 2);
                    for(let i = 0; i < pastasSeries.length; i++) {
                        const res = await fetch(`/api/iptv?action=get_series&category_id=${pastasSeries[i].category_id}`);
                        const series = await res.json();
                        if(series && series.length > 0) htmlExtra += gerarCarrosselHTML(limparNomePasta(pastasSeries[i].category_name), pastasSeries[i].category_id, 'series', 'tv', series.slice(0, 15));
                    }
                    
                    document.getElementById('conteudo-dinamico').innerHTML += htmlExtra;
                }, 500);

            } catch (error) { 
                document.getElementById('loading-state').innerHTML = "<div class='loading-text'>Erro de ligação. Atualize a página.</div>";
            }
        }

        // CARREGADOR EXCLUSIVO DA ABA TV
        async function carregarTV() {
            tvFoiCarregada = true;
            try {
                let htmlTV = "";
                const resTvCats = await fetch('/api/iptv?action=get_live_categories');
                const tvCats = await resTvCats.json();
                
                // Prioriza pastas famosas de TV
                const pastasTv = tvCats.filter(c => pastaTVValida(c.category_name)).sort((a,b) => {
                    const pri = /ABERTOS|GLOBO|TELECINE|HBO|ESPORTES/i;
                    return pri.test(b.category_name) - pri.test(a.category_name);
                }).slice(0, 5); // Mostra 5 fileiras na TV

                for(let i = 0; i < pastasTv.length; i++) {
                    const res = await fetch(`/api/iptv?action=get_live_streams&category_id=${pastasTv[i].category_id}`);
                    const canais = await res.json();
                    if(canais && canais.length > 0) htmlTV += gerarCarrosselHTML(pastasTv[i].category_name, pastasTv[i].category_id, 'live', 'broadcast-tower', canais.slice(0, 20));
                }
                document.getElementById('conteudo-tv').innerHTML = htmlTV;
            } catch(e) {
                document.getElementById('conteudo-tv').innerHTML = "<div class='loading-text'>Erro ao buscar canais.</div>";
            }
        }

        function gerarCarrosselHTML(nomePasta, catId, tipo, icone, lista) {
            let html = `
            <div class="section-header">
                <div class="section-title"><i class="fas fa-${icone}"></i> ${nomePasta}</div>
                <div class="ver-todos" onclick="abrirVerTodos('${tipo}', '${catId}', '${esc(nomePasta)}')">Ver Todos <i class="fas fa-chevron-right"></i></div>
            </div>
            <div class="carousel">`;
            
            lista.forEach(item => {
                if(tipo === 'live') {
                    const fmtd = processarTV(item.name);
                    const capa = item.stream_icon;
                    html += `
                    <div class="card-tv" onclick="abrirSheetTV('${esc(fmtd.limpo)}', '${item.stream_id}', '${esc(fmtd.tagsStr)}')">
                        <div class="card-badges">${gerarHTMLBadges(fmtd.tagsStr)}</div>
                        ${capa ? `<img src="${capa}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">` : ''}
                        <div class="titulo-tv" style="display:${capa ? 'none' : 'block'}">${fmtd.limpo}</div>
                    </div>`;
                } else {
                    const fmtd = processarTitulo(item.name, nomePasta);
                    const capa = item.stream_icon || item.cover;
                    const argId = tipo === 'vod' ? item.stream_id : item.series_id;
                    const argExt = item.container_extension || 'mp4';
                    
                    html += `
                    <div class="card-movie" onclick="abrirDetalhes('${esc(fmtd.limpo)}', '${esc(nomePasta)}', '${esc(capa)}', '${argId}', '${tipo}', '${argExt}', '${esc(fmtd.tagsStr)}')">
                        <div class="card-badges">${gerarHTMLBadges(fmtd.tagsStr)}</div>
                        ${capa ? `<img src="${capa}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">` : ''}
                        <div class="titulo-fallback" style="display:${capa ? 'none' : 'block'}">${fmtd.limpo}</div>
                    </div>`;
                }
            });
            return html + `</div>`;
        }

        async function abrirVerTodos(tipo, catId, nomePasta) {
            document.getElementById('titulo-grade').innerText = nomePasta;
            const containerGrade = document.getElementById('conteudo-grade');
            containerGrade.innerHTML = `<div class="loading-text" style="grid-column: span 3;"><i class="fas fa-spinner fa-spin"></i> A montar a grade...</div>`;
            
            mudarAba('view-grade', null);

            try {
                let action = 'get_vod_streams';
                if(tipo === 'series') action = 'get_series';
                else if(tipo === 'live') action = 'get_live_streams';

                const res = await fetch(`/api/iptv?action=${action}&category_id=${catId}`);
                const listaCompleta = await res.json();

                let htmlGrade = "";
                listaCompleta.forEach(item => {
                    if(tipo === 'live') {
                        const fmtd = processarTV(item.name);
                        const capa = item.stream_icon;
                        htmlGrade += `
                        <div class="card-movie card-tv" style="height: 100px;" onclick="abrirSheetTV('${esc(fmtd.limpo)}', '${item.stream_id}', '${esc(fmtd.tagsStr)}')">
                            <div class="card-badges">${gerarHTMLBadges(fmtd.tagsStr)}</div>
                            ${capa ? `<img src="${capa}" loading="lazy">` : ''}
                            <div class="titulo-tv" style="display:${capa ? 'none' : 'block'}">${fmtd.limpo}</div>
                        </div>`;
                    } else {
                        const fmtd = processarTitulo(item.name, nomePasta);
                        const capa = item.stream_icon || item.cover;
                        const argId = tipo === 'vod' ? item.stream_id : item.series_id;
                        const argExt = item.container_extension || 'mp4';
                        
                        htmlGrade += `
                        <div class="card-movie" onclick="abrirDetalhes('${esc(fmtd.limpo)}', '${esc(nomePasta)}', '${esc(capa)}', '${argId}', '${tipo}', '${argExt}', '${esc(fmtd.tagsStr)}')">
                            <div class="card-badges">${gerarHTMLBadges(fmtd.tagsStr)}</div>
                            ${capa ? `<img src="${capa}" loading="lazy">` : `<img src="https://via.placeholder.com/220x330/111/fff"><div class="titulo-fallback">${fmtd.limpo}</div>`}
                        </div>`;
                    }
                });

                containerGrade.innerHTML = htmlGrade;
            } catch(e) { containerGrade.innerHTML = `<p class="loading-text" style="grid-column: span 3;">Erro ao carregar a pasta.</p>`; }
        }

        function iniciarHeroSlider(nomeCat) {
            atualizarHero(nomeCat);
            heroInterval = setInterval(() => { heroIndex = (heroIndex + 1) % heroFilmes.length; atualizarHero(nomeCat); }, 5000);
        }
        function atualizarHero(nomeCat) {
            const f = heroFilmes[heroIndex]; if(!f) return;
            const fmtd = processarTitulo(f.name, nomeCat);
            document.getElementById('heroBanner').style.backgroundImage = `url('${f.stream_icon}')`;
            document.getElementById('heroTitle').innerText = fmtd.limpo;
            document.getElementById('heroTags').innerHTML = gerarHTMLBadges(fmtd.tagsStr) + `<span style="color:#fff; margin-left:5px;">${nomeCat}</span>`;
        }
        function abrirHeroDetalhes() {
            const f = heroFilmes[heroIndex]; if(!f) return;
            const fmtd = processarTitulo(f.name, ""); 
            abrirDetalhes(fmtd.limpo, "Destaque VIP", f.stream_icon, f.stream_id, 'vod', f.container_extension || 'mp4', fmtd.tagsStr);
        }

        function abrirDetalhes(titulo, cat, urlCapa, id, tipo, ext, tagsStr) {
            document.getElementById('dpTitle').innerText = titulo;
            document.getElementById('dpMeta').innerHTML = gerarHTMLBadges(tagsStr) + `<span style="color:var(--text-muted); margin-left:5px;">${cat}</span>`;
            if (!urlCapa || urlCapa === 'undefined') urlCapa = 'https://via.placeholder.com/800x600/111/fff';
            document.getElementById('dpPoster').style.backgroundImage = `url('${urlCapa}')`;
            
            document.getElementById('btnPlayFilme').onclick = () => dispararPlayer(id, tipo, ext, titulo);
            
            document.getElementById('detailsPage').classList.add('active');
            history.pushState({ modalOpen: true, type: 'details' }, null, "");
        }

        function fecharDetalhes() { document.getElementById('detailsPage').classList.remove('active'); }
        function fecharSheetTV() { document.getElementById('sheetOverlay').classList.remove('active'); document.getElementById('bottomSheet').classList.remove('active'); }

        async function dispararPlayer(id, tipo, ext, titulo) {
            if(tipo === 'series') { alert(`Série: ${titulo}\n(O painel de episódios será feito na próxima fase!)`); return; }

            const btn = (tipo === 'live') ? document.getElementById('btnPlayTV') : document.getElementById('btnPlayFilme');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Conectando...`;

            try {
                let urlFinal = "";
                if(tipo === 'vod') {
                    const res = await fetch(`/api/iptv?action=get_movie_url&stream_id=${id}&extension=${ext}`);
                    const data = await res.json();
                    urlFinal = data.url;
                } else if (tipo === 'live') {
                    const res = await fetch(`/api/iptv?action=get_live_url&stream_id=${id}`);
                    const data = await res.json();
                    urlFinal = data.url;
                }

                if (!urlFinal) throw new Error("A Vercel não retornou o link. (Canal Offline)");

                if (window.AndroidApp) {
                    window.AndroidApp.abrirVideoNativo(urlFinal);
                    setTimeout(() => { btn.innerHTML = textoOriginal; }, 1500);
                } else {
                    const urlLimpa = urlFinal.replace(/^https?:\/\//, '');
                    const intentUrl = `intent://${urlLimpa}#Intent;scheme=http;type=video/*;action=android.intent.action.VIEW;end;`;
                    window.location.href = intentUrl;
                    setTimeout(() => { btn.innerHTML = textoOriginal; }, 1500);
                }
            } catch (e) {
                alert(e.message.includes("Canal Offline") ? "Este canal parece estar desligado no servidor neste momento." : "Erro ao aceder à API.");
                btn.innerHTML = textoOriginal;
            }
        }

        // LÓGICA PERFEITA DO BOTÃO VOLTAR
        window.addEventListener('popstate', function(event) {
            if (document.getElementById('detailsPage').classList.contains('active')) {
                fecharDetalhes();
            } else if (document.getElementById('bottomSheet').classList.contains('active')) {
                fecharSheetTV();
            } else if (!document.getElementById('view-home').classList.contains('active')) {
                // Se estiver em Ver Todos, Buscar ou TV, volta para a Home
                mudarAba('view-home', document.getElementById('nav-home'));
            }
        });

        window.onload = initApp;
    </script>
</body>
</html>
