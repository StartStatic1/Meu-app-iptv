<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Mega - VOD Player</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navegação Superior */
        .navbar { background-color: #1a1a1a; padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #e50914; }
        .nav-btn { background-color: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background-color: #e50914; }
        
        /* Player Fixo */
        .player-area { width: 100%; max-height: 35vh; background-color: #000; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #333; }
        video { max-width: 100%; max-height: 100%; aspect-ratio: 16/9; }
        
        /* Área de Conteúdo */
        .bottom-area { display: flex; flex: 1; overflow: hidden; }
        
        /* Categorias (Barra Lateral) */
        .sidebar { width: 35%; max-width: 200px; background-color: #141414; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; overflow-y: auto; }
        .category-item { padding: 12px 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .category-item:hover { background-color: #e50914; color: #fff; }
        
        /* Grid de Filmes/Séries */
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: #0f0f0f; }
        .top-bar { padding: 10px; background-color: #141414; font-size: 12px; color: #aaa; text-align: center; border-bottom: 1px solid #2a2a2a; }
        .grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; align-content: start; }
        
        /* Cartão estilo Netflix */
        .card { background-color: #1e1e1e; border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(229, 9, 20, 0.5); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; display: block; }
        .card-title { font-size: 10px; font-weight: bold; padding: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn active" id="btnFilmes" onclick="setModo('vod')">Filmes</button>
        <button class="nav-btn" id="btnSeries" onclick="setModo('series')">Séries</button>
    </div>

    <div class="player-area">
        <video id="videoPlayer" controls poster="https://via.placeholder.com/800x450?text=CINE+MEGA"></video>
    </div>

    <div class="bottom-area">
        <div class="sidebar" id="categoryList">
            <div style="text-align:center; padding: 20px; font-size: 12px;">Carregando...</div>
        </div>

        <div class="main-content">
            <div class="top-bar" id="loading">Selecione uma categoria</div>
            <div class="grid" id="contentGrid"></div>
        </div>
    </div>

    <script>
        let modoAtual = 'vod'; // Pode ser 'vod' (Filmes) ou 'series' (Séries)

        function setModo(modo) {
            modoAtual = modo;
            document.getElementById('btnFilmes').classList.toggle('active', modo === 'vod');
            document.getElementById('btnSeries').classList.toggle('active', modo === 'series');
            document.getElementById('contentGrid').innerHTML = "";
            document.getElementById('loading').innerText = "Carregando categorias...";
            carregarCategorias();
        }

        async function carregarCategorias() {
            const list = document.getElementById('categoryList');
            list.innerHTML = "<div style='padding:10px; text-align:center;'>Aguarde...</div>";
            
            // Define qual rota da API chamar baseado no botão clicado
            const action = modoAtual === 'vod' ? 'get_vod_categories' : 'get_series_categories';

            try {
                const response = await fetch(`/api/iptv?action=${action}`);
                const categorias = await response.json();
                list.innerHTML = ""; 
                
                categorias.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'category-item';
                    div.innerText = cat.category_name;
                    div.onclick = () => carregarConteudo(cat.category_id, cat.category_name);
                    list.appendChild(div);
                });
            } catch (error) {
                list.innerHTML = "<div style='color:red; padding:10px;'>Erro ao carregar</div>";
            }
        }

        async function carregarConteudo(id, nomeCategoria) {
            const grid = document.getElementById('contentGrid');
            const loading = document.getElementById('loading');
            grid.innerHTML = "";
            loading.innerText = `Buscando em: ${nomeCategoria}...`;

            const action = modoAtual === 'vod' ? 'get_vod_streams' : 'get_series';

            try {
                const response = await fetch(`/api/iptv?action=${action}&category_id=${id}`);
                const itens = await response.json();
                loading.innerText = `${itens.length} títulos encontrados em: ${nomeCategoria}`;
                
                itens.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Xtream usa stream_icon para filmes e cover para séries
                    const coverUrl = item.stream_icon || item.cover || 'https://via.placeholder.com/200x300?text=Sem+Capa';
                    const titulo = item.name || "Sem Título";
                    const itemId = item.stream_id || item.series_id;
                    const ext = item.container_extension || 'mp4';
                    
                    card.innerHTML = `
                        <img class="card-img" src="${coverUrl}" onerror="this.src='https://via.placeholder.com/200x300?text=Sem+Capa'">
                        <div class="card-title">${titulo}</div>
                    `;
                    
                    card.onclick = () => {
                        if (modoAtual === 'vod') {
                            tocarFilme(itemId, titulo, ext);
                        } else {
                            alert(`Série: ${titulo}\n(Próximo nível: Criar a tela de episódios para o ID ${itemId})`);
                        }
                    };
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                loading.innerText = "Erro ao carregar os títulos.";
            }
        }

        async function tocarFilme(streamId, titulo, ext) {
            const video = document.getElementById('videoPlayer');
            const loading = document.getElementById('loading');
            loading.innerText = `Preparando filme: ${titulo}...`;

            try {
                // Pede o link do filme para o nosso backend Vercel
                const response = await fetch(`/api/iptv?action=get_movie_url&stream_id=${streamId}&extension=${ext}`);
                const data = await response.json();
                
                // Toca direto no navegador nativo (HTML5)
                video.src = data.url;
                video.play();
                loading.innerText = `Reproduzindo: ${titulo}`;
                
            } catch (error) {
                loading.innerText = "Erro ao buscar o arquivo de vídeo.";
            }
        }

        // Inicia carregando os filmes por padrão
        window.onload = () => setModo('vod');
    </script>
</body>
</html>
