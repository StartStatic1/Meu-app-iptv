<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Player Fixo no Topo */
        .player-area { width: 100%; max-height: 40vh; background-color: #000; border-bottom: 2px solid #00ff88; display: flex; justify-content: center; align-items: center; }
        video { max-width: 100%; max-height: 100%; aspect-ratio: 16/9; }
        
        /* Container Inferior (Menu Lateral + Canais) */
        .bottom-area { display: flex; flex: 1; overflow: hidden; }
        
        /* Barra Lateral - Categorias */
        .sidebar { width: 35%; max-width: 250px; background-color: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background-color: #00ff88; color: #000; font-weight: bold; text-align: center; font-size: 14px; }
        .category-list { flex: 1; overflow-y: auto; padding: 5px; }
        .category-item { padding: 10px; margin-bottom: 5px; background-color: #2a2a2a; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .category-item:hover { background-color: #3a3a3a; border-left: 4px solid #00ff88; }
        
        /* Área Principal - Canais */
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: #121212; }
        .top-bar { padding: 10px; background-color: #1a1a1a; border-bottom: 1px solid #2a2a2a; font-size: 12px; color: #aaa; text-align: center; }
        .channel-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; align-content: start; }
        .channel-card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .channel-card:hover { border-color: #00ff88; }
        .channel-logo { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; background: #000; border-radius: 4px;}
        .channel-name { font-size: 10px; font-weight: bold; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    </style>
</head>
<body>

    <div class="player-area">
        <video id="videoPlayer" controls></video>
    </div>

    <div class="bottom-area">
        <div class="sidebar">
            <div class="sidebar-header">Categorias Ao Vivo</div>
            <div class="category-list" id="categoryList">
                <div style="text-align:center; margin-top:20px; font-size: 12px;">Carregando...</div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar" id="loading">Selecione uma categoria</div>
            <div class="channel-grid" id="channelGrid">
                </div>
        </div>
    </div>

    <script>
        let hlsInstance = null;

        async function carregarCategorias() {
            const list = document.getElementById('categoryList');
            try {
                const response = await fetch('/api/iptv?action=get_live_categories');
                const categorias = await response.json();
                list.innerHTML = ""; 
                categorias.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'category-item';
                    div.innerText = cat.category_name;
                    div.onclick = () => carregarCanais(cat.category_id, cat.category_name);
                    list.appendChild(div);
                });
            } catch (error) {
                list.innerHTML = "<div style='color:red;'>Erro</div>";
            }
        }

        async function carregarCanais(id, nomeCategoria) {
            const grid = document.getElementById('channelGrid');
            const loading = document.getElementById('loading');
            grid.innerHTML = "";
            loading.innerText = `Carregando: ${nomeCategoria}...`;

            try {
                const response = await fetch(`/api/iptv?action=get_live_streams&category_id=${id}`);
                const canais = await response.json();
                loading.innerText = `${canais.length} canais em: ${nomeCategoria}`;
                
                canais.forEach(canal => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    
                    const logoUrl = canal.stream_icon ? canal.stream_icon : 'https://via.placeholder.com/40?text=TV';
                    
                    card.innerHTML = `
                        <img class="channel-logo" src="${logoUrl}" onerror="this.src='https://via.placeholder.com/40?text=TV'">
                        <div class="channel-name">${canal.name}</div>
                    `;
                    // Ao clicar, aciona o player
                    card.onclick = () => tocarCanal(canal.stream_id, canal.name);
                    grid.appendChild(card);
                });
            } catch (error) {
                loading.innerText = "Erro ao carregar.";
            }
        }

        async function tocarCanal(streamId, nomeCanal) {
            const video = document.getElementById('videoPlayer');
            const loading = document.getElementById('loading');
            
            loading.innerText = `Conectando: ${nomeCanal}...`;

            try {
                // 1. Pede o link secreto para a Vercel
                const response = await fetch(`/api/iptv?action=get_stream_url&stream_id=${streamId}`);
                const data = await response.json();
                const streamUrl = data.url;

                // 2. Toca o link no HLS.js
                if (hlsInstance) {
                    hlsInstance.destroy();
                }

                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(e => console.log("Autoplay bloqueado", e));
                        loading.innerText = `Rodando: ${nomeCanal}`;
                    });
                    hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) loading.innerText = `Erro de CORS ou Link Offline.`;
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                }
            } catch (error) {
                loading.innerText = "Erro ao puxar vídeo.";
            }
        }

        window.onload = carregarCategorias;
    </script>
</body>
</html>
